<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - ArtMatch</title>
    <style>
        :root {
            --primary: #6C5CE7; --bg: #F5F3FF; --surface: #FFFFFF;
            --text: #1E1B3A; --text2: #6B668C; --radius: 12px;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh;
        }
        .header{
            background: white; padding: 16px 24px; box-shadow: 0 1px 8px rgba(108,92,231,0.06);
            display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10;
        }
        .header .logo{font-size: 20px;}
        .header h1{font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #6C5CE7, #FD79A8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .header a{font-size: 14px; color: var(--text2); text-decoration: none; margin-left: auto;}
        .header a:hover{color: var(--primary);}
        .container{max-width: 600px; margin: 0 auto; padding: 60px 24px;}
        .card{
            background: var(--surface); border-radius: var(--radius); padding: 48px 40px; text-align: center;
            box-shadow: 0 2px 16px rgba(108,92,231,0.06);
        }
        .card .icon{font-size: 48px; margin-bottom: 16px;}
        .card h2{font-size: 24px; margin-bottom: 8px; color: var(--text);}
        .card .sub{font-size: 14px; color: var(--text2); margin-bottom: 32px;}
        .email-box{
            display: inline-block; background: #F5F3FF; border: 2px solid #E8E5FF;
            border-radius: 12px; padding: 16px 32px; font-size: 18px; color: var(--primary);
            font-weight: 600; text-decoration: none; transition: all .3s; word-break: break-all;
        }
        .email-box:hover{background: #EDEAFF; border-color: #6C5CE7; box-shadow: 0 4px 20px rgba(108,92,231,0.12);}
        .note{font-size: 13px; color: #A8A3C8; margin-top: 24px;}
    </style>
</head>
<body>
<div class="header">
    <span class="logo">📧</span>
    <h1>ArtMatch 联系我们</h1>
    <a href="index.html">← 返回首页</a>
</div>
<div class="container">
    <div class="card">
        <div class="icon">💌</div>
        <h2>联系支持团队</h2>
        <p class="sub">如有任何问题、建议或反馈，欢迎通过以下邮箱联系我们</p>
        <a href="mailto:iyuengg@outlook.com" class="email-box">✉️ iyuengg@outlook.com</a>
        <p class="note">我们通常会在24小时内回复您的邮件</p>
    </div>
</div>
<!-- HR精灵 悬浮聊天窗口 -->
<style>
.hr-fairy-wrap{position:fixed;bottom:24px;right:24px;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;}
.hr-fairy-btn{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#6C5CE7,#FD79A8);border:none;cursor:pointer;box-shadow:0 6px 36px rgba(108,92,231,0.35);display:flex;align-items:center;justify-content:center;font-size:50px;transition:all .3s;position:relative;}
.hr-fairy-btn:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(108,92,231,0.4);}
.hr-fairy-btn .pulse{position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(108,92,231,0.3);animation:hrPulse 2s ease-out infinite;}
@keyframes hrPulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.4);opacity:0}}
.hr-fairy-dot{position:absolute;top:2px;right:2px;width:12px;height:12px;background:#00B894;border-radius:50%;border:2px solid white;}
.hr-chat{position:absolute;bottom:70px;right:0;width:380px;height:520px;background:white;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,0.15);display:none;flex-direction:column;overflow:hidden;border:1px solid #F0EDFF;}
.hr-chat.open{display:flex;}
.hr-chat-header{background:linear-gradient(135deg,#6C5CE7,#8B7CF7);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hr-chat-header .title{font-size:15px;font-weight:700;}
.hr-chat-header .close{background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
.hr-chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#FAFAFF;}
.hr-chat-body::-webkit-scrollbar{width:4px;}
.hr-chat-body::-webkit-scrollbar-thumb{background:#D5D0F0;border-radius:2px;}
.hr-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;}
.hr-msg.bot{background:#F0EDFF;color:#2D3436;align-self:flex-start;border-bottom-left-radius:4px;}
.hr-msg.user{background:linear-gradient(135deg,#6C5CE7,#8B7CF7);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.hr-msg.typing{background:#F0EDFF;color:#A8A3C8;align-self:flex-start;font-style:italic;border-bottom-left-radius:4px;}
.hr-chat-input{display:flex;padding:12px 16px;gap:10px;background:white;border-top:1px solid #F0EDFF;flex-shrink:0;}
.hr-chat-input input{flex:1;border:2px solid #F0EDFF;border-radius:25px;padding:10px 16px;font-size:14px;outline:none;transition:border .3s;}
.hr-chat-input input:focus{border-color:#6C5CE7;}
.hr-chat-input button{background:linear-gradient(135deg,#6C5CE7,#8B7CF7);color:white;border:none;border-radius:25px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;}
.hr-chat-input button:hover{opacity:0.9;transform:translateY(-1px);}
.hr-chat-input button:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
@media(max-width:440px){.hr-chat{width:calc(100vw - 48px);height:460px;right:0;}}
</style>
<div class="hr-fairy-wrap">
    <button class="hr-fairy-btn" onclick="hrFairy.toggle()" title="HR精灵 - 求职助手">
        <span class="pulse"></span>
        <span class="hr-fairy-dot"></span>
        🧚
    </button>
    <div class="hr-chat" id="hrChatPanel">
        <div class="hr-chat-header">
            <span class="title">🧚 HR精灵 · 求职助手</span>
            <button class="close" onclick="hrFairy.toggle()">✕</button>
        </div>
        <div class="hr-chat-body" id="hrChatBody"></div>
        <div class="hr-chat-input">
            <input type="text" id="hrChatInput" placeholder="问我任何求职或使用问题..." onkeydown="if(event.key==='Enter')hrFairy.send()">
            <button id="hrChatSend" onclick="hrFairy.send()">发送</button>
        </div>
    </div>
</div>
<script src="chat-engine.js"></script>
<script>
var hrFairy={history:[],open:false,init:function(){document.getElementById('hrChatBody').innerHTML='<div class="hr-msg bot">👋 你好！我是ArtMatch的<strong>HR精灵</strong>，你的专属求职助手。\n\n我可以帮你：\n🎯 解答求职方向选择的困惑\n📝 提供简历优化建议\n💼 分享面试技巧和行业资讯\n📖 指导使用ArtMatch平台功能\n\n有什么想问的？尽管开口！</div>';},toggle:function(){this.open=!this.open;document.getElementById('hrChatPanel').classList.toggle('open',this.open);if(this.open)document.getElementById('hrChatInput').focus();},addMsg:function(t,r){var e=document.createElement('div');e.className='hr-msg '+r;e.textContent=t;document.getElementById('hrChatBody').appendChild(e);document.getElementById('hrChatBody').scrollTop=document.getElementById('hrChatBody').scrollHeight;},showTyping:function(){var e=document.createElement('div');e.className='hr-msg typing';e.textContent='HR精灵正在思考...';e.id='hrTyping';document.getElementById('hrChatBody').appendChild(e);document.getElementById('hrChatBody').scrollTop=document.getElementById('hrChatBody').scrollHeight;},hideTyping:function(){var e=document.getElementById('hrTyping');if(e)e.remove();},send:function(){var e=document.getElementById('hrChatInput'),t=document.getElementById('hrChatSend'),n=e.value.trim();if(!n)return;this.addMsg(n,'user');this.history.push({role:'user',content:n});e.value='';t.disabled=true;this.showTyping();var o=this;setTimeout(function(){o.hideTyping();var r=hrFairyReply(n);o.addMsg(r,'bot');o.history.push({role:'assistant',content:r});t.disabled=false},500)}};
hrFairy.init();
</script>
</body>
</html>
